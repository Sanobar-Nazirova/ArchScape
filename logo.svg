<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Plate radial gradient (white centre → light grey edge) -->
    <radialGradient id="plate" cx="42%" cy="38%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="85%"  stop-color="#f4f4f4"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>

    <!-- Main sphere: bright gold top-left → deep warm-orange bottom-right -->
    <radialGradient id="sph" cx="32%" cy="26%" r="78%">
      <stop offset="0%"   stop-color="#fcc050"/>
      <stop offset="20%"  stop-color="#f09828"/>
      <stop offset="50%"  stop-color="#d47010"/>
      <stop offset="78%"  stop-color="#a84c08"/>
      <stop offset="100%" stop-color="#883808"/>
    </radialGradient>

    <!-- Sphere bottom warm ambient (subtle extra warmth at base) -->
    <radialGradient id="sphAmbient" cx="50%" cy="92%" r="50%">
      <stop offset="0%"   stop-color="#f08010" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#f08010" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner glossy lens: creamy-white centre → amber edges -->
    <radialGradient id="lens" cx="36%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#fff9e0"/>
      <stop offset="30%"  stop-color="#fbe080"/>
      <stop offset="65%"  stop-color="#d8a028"/>
      <stop offset="100%" stop-color="#b07818"/>
    </radialGradient>

    <!-- Specular highlight on lens (bright white, top-left) -->
    <radialGradient id="spec" cx="26%" cy="20%" r="58%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="38%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="75%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="plateShadow" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="12" flood-color="#00000018"/>
    </filter>

    <clipPath id="pc"><circle cx="256" cy="256" r="247"/></clipPath>
  </defs>

  <!-- ── Outer plate ── -->
  <circle cx="256" cy="256" r="254" fill="#d4d4d4" opacity="0.4"/>
  <circle cx="256" cy="256" r="250" fill="url(#plate)" filter="url(#plateShadow)"/>
  <!-- Rim ring (very subtle) -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#c8c8c8" stroke-width="1.5"/>

  <!-- ── Main orange-gold sphere ── -->
  <!-- Sphere is slightly offset downward so it appears to "sit" in the plate -->
  <ellipse cx="258" cy="298" rx="218" ry="210"
    fill="url(#sph)" clip-path="url(#pc)"/>

  <!-- Warm ambient glow at sphere base -->
  <ellipse cx="258" cy="400" rx="185" ry="110"
    fill="url(#sphAmbient)" clip-path="url(#pc)"/>

  <!-- ── Inner glossy lens / bubble ── -->
  <!-- Sits upper-centre of the sphere, rotated ~-18° to match the organic tilt -->
  <g clip-path="url(#pc)" transform="rotate(-18, 228, 216)">
    <!-- Lens body -->
    <ellipse cx="228" cy="216" rx="160" ry="118" fill="url(#lens)" opacity="0.95"/>
    <!-- Outer rim white glow -->
    <ellipse cx="228" cy="216" rx="160" ry="118"
      fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="4"/>
    <!-- Inner subtle sheen border -->
    <ellipse cx="228" cy="216" rx="154" ry="113"
      fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="8"/>
    <!-- Specular flash -->
    <ellipse cx="178" cy="170" rx="128" ry="90" fill="url(#spec)"/>
  </g>

  <!-- Plate edge vignette (very light amber tint at rim to unify colours) -->
  <circle cx="256" cy="256" r="248" fill="none"
    stroke="rgba(200,130,40,0.10)" stroke-width="20"/>
</svg>
